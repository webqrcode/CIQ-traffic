<!DOCTYPE html>
<html>
<head>
    <title>Route Comparison</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
    
        .container {
            display: grid;
           grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
    
        .route {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
        }
    
        iframe {
            width: 100%;
            height: 450px;
            border: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="route">    
        <h2>Route to Woodland</h2>
        <iframe 
          src="https://www.google.com/maps/embed?pb=!1m26!1m12!1m3!1d27617.764963259637!2d103.77504373673848!3d1.4547034122609481!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!4m11!3e0!4m4!2s1.422092%2C%20103.771133!3m2!1d1.422092!2d103.77113299999999!4m4!2s1.466289%2C%20103.768280!3m2!1d1.466289!2d103.76827999999999!5e0!3m2!1sen!2ssg!4v1783307221866!5m2!1sen!2ssg"
          allowfullscreen="" loading="lazy">
        </iframe>
    </div>
        
    <div class="route">  
        <h2>Route to Tuas</h2>
        <iframe 
          src="https://www.google.com/maps/embed?pb=!1m26!1m12!1m3!1d53013.98588320136!2d103.61267142722704!3d1.3456948136750335!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!4m11!3e0!4m4!2s1.322942%2C%20103.663148!3m2!1d1.3229419999999998!2d103.66314799999999!4m4!2s1.378842%2C%20103.596281!3m2!1d1.378842!2d103.59628099999999!5e0!3m2!1sen!2ssg!4v1783307353545!5m2!1sen!2ssg"
          allowfullscreen="" loading="lazy">
        </iframe>
    </div>

    <div class="route"> 
        <h2>Woodland back SG</h2>
        <iframe 
          src="https://www.google.com/maps/embed?pb=!1m26!1m12!1m3!1d8601.5417189264!2d103.76724845073811!3d1.4667313769073957!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!4m11!3e0!4m4!2s1.476154%2C%20103.763433!3m2!1d1.476154!2d103.76343299999999!4m4!2s1.440200%2C%20103.768391!3m2!1d1.4402!2d103.768391!5e1!3m2!1sen!2ssg!4v1783309463895!5m2!1sen!2ssg"
          allowfullscreen="" loading="lazy">
        </iframe>
    </div>
         
    <div class="route">
        <h2>Tuas back SG</h2>
        <iframe 
          src="https://www.google.com/maps/embed?pb=!1m25!1m12!1m3!1d62002.3504353454!2d103.63264658250385!3d1.3579669259654081!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!4m10!3e0!4m4!2s1.400815%2C%20103.587860!3m2!1d1.400815!2d103.58785999999999!4m3!3m2!1d1.3411836!2d103.64438559999999!5e0!3m2!1sen!2ssg!4v1783307548870!5m2!1sen!2ssg"
          allowfullscreen="" loading="lazy">
        </iframe>
    </div>
        
</div>
</body>
</html>
